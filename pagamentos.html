<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brilho Certo - Pagamentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="pagamentos.css">

</head>

<body>

<div class="sidebar">

<h3>🚗 Brilho Certo</h3>

<button
class="menu-btn"
onclick="location.href='dashboard.html'">
🏠 Início
</button>

<button
class="menu-btn"
onclick="location.href='agendamentos.html'">
📅 Agenda
</button>

<button
class="menu-btn ativo">
💳 Pagamentos
</button>

<button
class="menu-btn"
onclick="location.href='despesas.html'">
💸 Despesas
</button>

<button
class="menu-btn">
📊 Relatórios
</button>

<button
class="menu-btn"
onclick="logout()">
🚪 Sair
</button>

</div>

<div class="content">

<h2>💳 Gestão de Pagamentos</h2>

<div class="row mb-4">

<div class="col-md-4">

<div class="card-dashboard">

<div>💰 Recebido Hoje</div>

<div
class="numero text-success"
id="recebidoHoje">

€ 0,00

</div>

</div>

</div>

<div class="col-md-4">

<div class="card-dashboard">

<div>💰 Recebido Mês</div>

<div
class="numero text-primary"
id="recebidoMes">

€ 0,00

</div>

</div>

</div>

<div class="col-md-4">

<div class="card-dashboard">

<div>📌 Valores Pendentes</div>

<div
class="numero text-danger"
id="valorPendente">

€ 0,00

</div>

</div>

</div>

</div>

<div class="card-dashboard">

<h4>📅 Serviços do Dia</h4>

<div id="listaServicosHoje">

Nenhum serviço carregado.

</div>

</div>

<div class="card-dashboard">

<h4>💳 Registar Pagamento</h4>

<form id="formPagamento">

<div class="row">

<div class="col-md-6">

<label class="form-label">

Cliente

</label>

<input
type="text"
id="cliente"
class="form-control mb-3"
readonly>

</div>

<div class="col-md-6">

<label class="form-label">

Telefone

</label>

<input
type="text"
id="telefone"
class="form-control mb-3"
readonly>

</div>

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">

Modelo do Carro

</label>

<input
type="text"
id="modelo"
class="form-control mb-3"
readonly>

</div>

<div class="col-md-6">

<label class="form-label">

Serviços

</label>

<input
type="text"
id="servicos"
class="form-control mb-3"
readonly>

</div>

</div>

<label class="form-label">

Valor (€)

</label>

<input
type="number"
step="0.01"
id="valor"
class="form-control mb-3"
required>

<label class="form-label">

Forma de Pagamento

</label>

<select
id="formaPagamento"
class="form-control mb-3"
required>

<option value="">
Selecione
</option>

<option>
Dinheiro
</option>

<option>
MB Way
</option>

<option>
Transferência
</option>

<option>
Multibanco
</option>

</select>

<label class="form-label">

Status

</label>

<select
id="status"
class="form-control mb-3"
required>

<option value="">
Selecione
</option>

<option>
Pago em Dinheiro
</option>

<option>
Pago em MB Way
</option>

<option>
Pago em Transferência
</option>

<option>
Pago em Multibanco
</option>

<option>
MB Way Pendente
</option>

<option>
Transferência Pendente
</option>

<option>
Entregue sem Pagamento
</option>

</select>

<label class="form-label">

Observações

</label>

<textarea
id="observacoes"
class="form-control mb-3"
rows="3"></textarea>

<button
type="submit"
class="btn btn-success w-100">

Guardar Pagamento

</button>

</form>

</div>

<div class="card-dashboard">

<h4>📌 Pagamentos Pendentes</h4>

<div id="listaPendentes">

Nenhuma pendência.

</div>

</div>

</div>

<script src="pagamentos.js"></script>

</body>

</html>
