<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brilho Certo - Relatórios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="relatorios.css">

</head>

<body>

<div class="sidebar">

<h3>🚗 Brilho Certo</h3>

<button class="menu-btn"
onclick="location.href='dashboard.html'">
🏠 Início
</button>

<button class="menu-btn"
onclick="location.href='agendamentos.html'">
📅 Agenda
</button>

<button class="menu-btn"
onclick="location.href='pagamentos.html'">
💳 Pagamentos
</button>

<button class="menu-btn"
onclick="location.href='despesas.html'">
💸 Despesas
</button>

<button class="menu-btn ativo">
📊 Relatórios
</button>

</div>

<div class="content">

<h2>📊 Relatórios e Indicadores</h2>

<div class="row mb-4">

<div class="col-md-3">

<div class="card-dashboard">

<div>💰 Receita Hoje</div>

<div
class="numero text-success"
id="receitaHoje">

€ 0,00

</div>

</div>

</div>

<div class="col-md-3">

<div class="card-dashboard">

<div>💸 Despesa Hoje</div>

<div
class="numero text-danger"
id="despesaHoje">

€ 0,00

</div>

</div>

</div>

<div class="col-md-3">

<div class="card-dashboard">

<div>📈 Saldo Hoje</div>

<div
class="numero text-primary"
id="saldoHoje">

€ 0,00

</div>

</div>

</div>

<div class="col-md-3">

<div class="card-dashboard">

<div>🚗 Veículos Hoje</div>

<div
class="numero"
id="veiculosHoje">

0

</div>

</div>

</div>

</div>

<div class="card-dashboard">

<h4>Filtros</h4>

<div class="row">

<div class="col-md-4">

<select
id="filtroPeriodo"
class="form-control">

<option value="hoje">
Hoje
</option>

<option value="mes">
Este Mês
</option>

<option value="ano">
Este Ano
</option>

</select>

</div>

</div>

</div>

<div class="card-dashboard">

<h4>Movimentações</h4>

<table class="table">

<thead>

<tr>

<th>Data</th>

<th>Tipo</th>

<th>Descrição</th>

<th>Valor</th>

</tr>

</thead>

<tbody id="tabelaMovimentos">

</tbody>

</table>

</div>

<div class="card-dashboard">

<h4>📈 Indicadores</h4>

<div id="indicadores">

Em desenvolvimento...

</div>

</div>

</div>

<script src="relatorios.js"></script>

</body>
</html>
