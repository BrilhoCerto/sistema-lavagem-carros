<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brilho Certo - Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
background:#eef3f8;
font-family:Arial,sans-serif;
margin:0;
}
.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:#0d6efd;
padding:20px;
color:white;
overflow:auto;
}
.sidebar h3{
font-weight:bold;
margin-bottom:25px;
}
.menu-btn{
width:100%;
margin-bottom:10px;
border:none;
padding:12px;
border-radius:10px;
background:white;
color:#0d6efd;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}
.menu-btn:hover{
background:#dbeafe;
transform:translateX(5px);
}
.content{
margin-left:280px;
padding:20px;
}
.card-dashboard{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}
.numero{
font-size:32px;
font-weight:bold;
}
.verde{
color:#198754;
}
.amarelo{
color:#fd7e14;
}
.azul{
color:#0d6efd;
}
.lista-item{
padding:12px;
border-bottom:1px solid #eee;
}
.lista-item:hover{
background:#f8fafc;
}
@media(max-width:768px){
.sidebar{
display:none;
}
.content{
margin-left:0;
padding:10px;
}
}
</style>
</head>
<body>
<div class="sidebar">
<h3>🚗 Brilho Certo</h3>
<button class="menu-btn">
🏠 Início
</button>

📅 Agenda

</button>
<button class="menu-btn">

💳 Pagamentos

</button>
<button class="menu-btn">

📊 Relatórios

</button>

🚪 Sair

</button>
</div>
<div class="content">
<h2>Dashboard do Dia</h2>
<div class="row">
<div class="col-md-3">
<div class="card-dashboard">
<div>Agendamentos Hoje</div>
<div
class="numero azul"
id="totalHoje">

0

</div>
</div>
</div>
<div class="col-md-3">
<div class="card-dashboard">
<div>Concluídos</div>
<div
class="numero verde"
id="totalConcluidos">

0

</div>
</div>
</div>


<div class="col-md-3">
<div class="card-dashboard">
<div>Pendentes</div>
<div
class="numero amarelo"
id="totalPendentes">

0

</div>
</div>
</div>
<div class="col-md-3">
<div class="card-dashboard">
<div>Valor Previsto (€)</div>
<div
class="numero"
id="valorPrevisto">

0.00

</div>
</div>
</div>
</div>
<div class="card-dashboard">
<h4>🚗 Próximo Atendimento</h4>
<div id="proximoAtendimento">

Nenhum atendimento para hoje.

</div>
</div>
<div class="card-dashboard">
<h4>📋 próximos 7 Dias</h4>
<div id="listaHoje">

Nenhum agendamento.

</div>
</div>
<div class="row">
<div class="col-md-4 mb-2">

➕ Novo Agendamento

</button>
</div>
<div class="col-md-4 mb-2">

🚗 Atendimento Imediato

</button>
</div>
<div class="col-md-4 mb-2">

📅 Abrir Agenda

</button>
</div>
</div>
</div>
<script>
const perfil =
localStorage.getItem("perfil");
if(!perfil){
window.location.href =
"login.html";
}
const agendamentos =
JSON.parse(
localStorage.getItem("agendamentos")
) || [];
const hoje = new Date();

const seteDias =
new Date();

seteDias.setDate(
hoje.getDate() + 7
);

const agendamentosHoje =
agendamentos.filter(item => {

const dataAgendamento =
new Date(item.data);

return dataAgendamento >= hoje
&&
dataAgendamento <= seteDias;

});
document
.getElementById("totalHoje")
.textContent =
agendamentosHoje.length;
const concluidos =
agendamentosHoje.filter(
a => a.status === "Concluído"
).length;
document
.getElementById("totalConcluidos")
.textContent =
concluidos;
document
.getElementById("totalPendentes")
.textContent =
agendamentosHoje.length - concluidos;
const valorTotal =
agendamentosHoje.reduce(
(total,item)=>
total +
(parseFloat(item.valor)||0),
0
);
document
.getElementById("valorPrevisto")
.textContent =
valorTotal.toFixed(2);

agendamentosHoje.sort((a,b)=>{

const dataA =
new Date(
a.data + "T" + a.hora
);

const dataB =
new Date(
b.data + "T" + b.hora
);

return dataA - dataB;

});

if(agendamentosHoje.length > 0){

const proximo =
agendamentosHoje[0];

document
.getElementById("proximoAtendimento")
.innerHTML = `

<strong>${proximo.hora}</strong><br>

${proximo.cliente}<br>

${(proximo.servicos || []).join(", ")}

`;

let html = “”;

agendamentosHoje.forEach(item=>{

const status =
item.status || “Agendado”;

const emoji =
status === “Concluído”
? “🟢”
: “🟡”;

html += `

<div class="lista-item">

${item.hora}

${item.cliente}

${item.modelo}

${(item.servicos || []).join(”, “)}

${emoji} ${status}

</div>

`;

});

document
.getElementById(“listaHoje”)
.innerHTML = html;

}

function logout(){

localStorage.removeItem(“perfil”);

window.location.href =
“login.html”;

}

document
.getElementById(
“btnAtendimentoImediato”
)
.addEventListener(
“click”,
function(){

alert(
“Funcionalidade disponível na próxima atualização da versão 2.2.”
);

}
);

</script>
</body>
</html>
