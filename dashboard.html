<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brilho Certo - Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef3f8;
font-family:Arial,sans-serif;
margin:0;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:#0d6efd;
padding:20px;
color:white;
overflow:auto;
}

.sidebar h3{
font-weight:bold;
margin-bottom:25px;
}

.menu-btn{
width:100%;
margin-bottom:10px;
border:none;
padding:12px;
border-radius:10px;
background:white;
color:#0d6efd;
font-weight:bold;
cursor:pointer;
}

.menu-btn:hover{
background:#dbeafe;
}

.content{
margin-left:280px;
padding:20px;
}

.card-dashboard{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.card-futuro{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 15px rgba(0,0,0,0.08);
height:120px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
color:#999;
margin-bottom:20px;
}

.lista-item{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

.lista-item:hover{
background:#f8fafc;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.content{
margin-left:0;
padding:10px;
}

}

</style>
</head>

<body>

<div class="sidebar">

<h3>🚗 Brilho Certo</h3>

<button class="menu-btn"
onclick="location.href='dashboard.html'">
🏠 Início
</button>

<button class="menu-btn"
onclick="location.href='agendamentos.html'">
📅 Agenda
</button>

<button class="menu-btn">
💳 Pagamentos
</button>

<button
class="menu-btn"
onclick="location.href='despesas.html'">
💸 Despesas
</button>

<button class="menu-btn">
📊 Relatórios
</button>

<button class="menu-btn"
onclick="logout()">
🚪 Sair
</button>

</div>

<div class="content">

<h2>Dashboard</h2>

<div class="row">

<div class="col-md-6">
<div class="card-futuro">
Card Futuro 1
</div>
</div>

<div class="col-md-6">
<div class="card-futuro">
Card Futuro 2
</div>
</div>

</div>

<div class="card-dashboard">

<h4>📋 Lista de Agendamentos</h4>

<div id="listaAgendamentos">
Carregando...
</div>

</div>

</div>

<script>

const perfil =
localStorage.getItem("perfil");

if(!perfil){
window.location.href = "login.html";
}

const agendamentos =
JSON.parse(
localStorage.getItem("agendamentos")
) || [];

let html = "";

agendamentos
.sort((a,b)=>{

const dataA =
new Date(a.data + "T" + a.hora);

const dataB =
new Date(b.data + "T" + b.hora);

return dataA - dataB;

})
.forEach(item=>{

html += `

<div class="lista-item">

${item.data}
&nbsp;|&nbsp;
${item.hora}
&nbsp;|&nbsp;
${item.cliente}
&nbsp;|&nbsp;
${item.modelo}
&nbsp;|&nbsp;
${(item.servicos || []).join(", ")}

</div>

`;

});

document
.getElementById("listaAgendamentos")
.innerHTML =
html || "Nenhum agendamento encontrado.";

function logout(){

localStorage.removeItem("perfil");

window.location.href =
"login.html";

}

</script>

</body>
</html>
