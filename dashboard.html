<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brilho Certo - Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#eef3f8;
font-family:Arial,sans-serif;
margin:0;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:#0d6efd;
padding:20px;
color:white;
}

.sidebar h3{
margin-bottom:25px;
}

.menu-btn{
width:100%;
margin-bottom:10px;
border:none;
padding:12px;
border-radius:10px;
background:white;
color:#0d6efd;
font-weight:bold;
cursor:pointer;
}

.content{
margin-left:280px;
padding:20px;
}

.card-dashboard{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.numero{
font-size:32px;
font-weight:bold;
color:#0d6efd;
}

.lista-item{
padding:12px;
border-bottom:1px solid #eee;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.content{
margin-left:0;
padding:10px;
}

}
</style>
</head>

<body>

<div class="sidebar">

<h3>🚗 Brilho Certo</h3>

<button class="menu-btn"
onclick="location.href='dashboard.html'">
🏠 Início
</button>

<button class="menu-btn"
onclick="location.href='agendamentos.html'">
📅 Agenda
</button>

<button class="menu-btn"
onclick="logout()">
🚪 Sair
</button>

</div>

<div class="content">

<h2>Dashboard</h2>

<div class="row">

<div class="col-md-6">
<div class="card-dashboard">
<div>Total de Agendamentos</div>
<div class="numero" id="totalAgendamentos">0</div>
</div>
</div>

<div class="col-md-6">
<div class="card-dashboard">
<div>Valor Total (€)</div>
<div class="numero" id="valorTotal">0.00</div>
</div>
</div>

</div>

<div class="card-dashboard">

<h4>📋 Lista de Agendamentos</h4>

<div id="listaAgendamentos">
Carregando...
</div>

</div>

</div>

<script>

const perfil = localStorage.getItem("perfil");

if(!perfil){
window.location.href="login.html";
}

const agendamentos =
JSON.parse(localStorage.getItem("agendamentos")) || [];

document.getElementById("totalAgendamentos").textContent =
agendamentos.length;

const total =
agendamentos.reduce(
(soma,item)=>
soma + (parseFloat(item.valor)||0),
0
);

document.getElementById("valorTotal").textContent =
total.toFixed(2);

let html = "";

agendamentos
.sort((a,b)=>{

const dataA =
new Date(a.data + "T" + a.hora);

const dataB =
new Date(b.data + "T" + b.hora);

return dataA - dataB;

})
.forEach(item=>{

html += `
<div class="lista-item">
<strong>${item.data}</strong><br>
${item.hora} - ${item.cliente}<br>
${item.modelo}
</div>
`;

});

document.getElementById("listaAgendamentos").innerHTML =
html || "Nenhum agendamento encontrado.";

function logout(){

localStorage.removeItem("perfil");

window.location.href="login.html";

}

</script>

</body>
</html>
