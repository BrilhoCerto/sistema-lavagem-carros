<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brilho Certo - Lavagem de Carros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>

body{
background:#eef3f8;
font-family:Arial, sans-serif;
margin:0;
}

/* MENU */

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:#0d6efd;
padding:20px;
color:white;
overflow:auto;
}

.sidebar h3{
font-weight:bold;
margin-bottom:25px;
}

.menu-btn{
width:100%;
margin-bottom:10px;
border:none;
padding:12px;
border-radius:8px;
background:white;
color:#0d6efd;
font-weight:bold;
cursor:pointer;
}

/* CONTEÚDO */

.content{
margin-left:280px;
padding:20px;
}

/* CARDS */

.card-custom{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 2px 15px rgba(0,0,0,0.10);
margin-bottom:20px;
}

/* CALENDÁRIO */

#calendar{
background:white;
padding:10px;
border-radius:15px;
}

/* FORM */

.form-label{
font-weight:bold;
}

.servico-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
margin-bottom:5px;
background:#f7f7f7;
border-radius:8px;
}

#btnAtualizar{
display:none;
}

#listaDia{
max-height:300px;
overflow:auto;
}

.agendamento-item{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.agendamento-item:hover{
background:#f0f7ff;
}

.fc-daygrid-day.fc-day-selecionado{
background:#d8e9ff !important;
}

@media (max-width: 768px){

@media (max-width: 768px){

.sidebar{
position:relative;
width:100%;
height:auto;
display:block;
padding:10px;
}

.menu-btn{
margin-bottom:5px;
font-size:14px;
}

.content{
margin-left:0;
padding:10px;
}

#calendar{
height:auto !important;
}

.card-custom{
padding:12px;
}

} 
</style>

</head>

<body>
<div class="sidebar">
<h3>🚗 Brilho Certo</h3>

<button
class="menu-btn"
onclick="location.href='dashboard.html'">
🏠 Início
</button>

<button class="menu-btn">
📅 Agenda
</button>

<button class="menu-btn"
onclick="location.href='pagamentos.html'">
💳 Pagamentos
</button>

<button
id="menuDespesas"
class="menu-btn"
onclick="location.href='despesas.html'">
💸 Despesas
</button>

<button
id="menuRelatorios"
class="menu-btn"
onclick="location.href='relatorios.html'">
📊 Relatórios
</button>

</div>

<div class="content">

<div class="row">

<div class="col-lg-8">

<div class="card-custom">

<div id="calendar"></div>

</div>

</div>

<div class="col-lg-4">

<div class="card-custom">

<h4>Novo Agendamento</h4>

<form id="formAgendamento">

<label class="form-label">
Nome do Cliente
</label>

<input
type="text"
id="cliente"
class="form-control mb-3"
required>

<label class="form-label">
Telefone
</label>

<input
type="text"
id="telefone"
class="form-control mb-3"
required>

<label class="form-label">
Modelo do Carro
</label>

<input
type="text"
id="modelo"
class="form-control mb-3"
required>

<label class="form-label">
Data do Agendamento
</label>

<input
type="date"
id="data"
class="form-control mb-3"
required>

<label class="form-label">
Hora do Agendamento
</label>

<select
id="hora"
class="form-control mb-3"
required>
</select>

<label class="form-label">
Serviços
</label>

<div class="servico-item">
<label>
<input type="checkbox" value="Aspiração interior e exterior">
 Aspiração interior e exterior
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Estofos sem teto">
 Estofos sem teto
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Estofos com teto">
 Estofos com teto
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Faróis">
 Faróis
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Polimento">
 Polimento
</label>
</div>

<div class="servico-item">
<label>
<input type="checkbox" value="Lavagem dos bancos">
 Lavagem dos bancos
</label>
</div>

<label class="form-label mt-3">
Valor Total (€)
</label>

<input
type="number"
id="valor"
class="form-control mb-3">

<label class="form-label">
Observações
</label>

<textarea
id="observacoes"
class="form-control mb-3"
rows="3"></textarea>

<button
type="submit"
class="btn btn-primary w-100"
id="btnSalvar">

Salvar Agendamento

</button>

<button
type="button"
class="btn btn-warning w-100 mt-2"
id="btnAtualizar">

Salvar Alterações

</button>

<button
type="button"
class="btn btn-danger w-100 mt-2"
onclick="excluirAgendamento()">

Apagar Agendamento

</button>


</form>

</div>

<div class="card-custom">

<h5>
Agendamentos do Dia
</h5>

<div id="listaDia">

Selecione um dia no calendário.

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script>

const perfil = localStorage.getItem("perfil");

if(!perfil){
window.location.href = "login.html";
}
 </script>

 <script>
let calendario;

let agendamentos =
JSON.parse(localStorage.getItem("agendamentos")) || [];

let agendamentoEditando = null;

let diaSelecionado = null;

/* HORÁRIOS */

function carregarHorarios(){

const selectHora =
document.getElementById("hora");

selectHora.innerHTML = "";

for(let hora=8; hora<=18; hora++){

for(let minuto of [0,30]){

if(hora === 18 && minuto === 30){
continue;
}

const horario =
String(hora).padStart(2,'0')
+ ':'
+
String(minuto).padStart(2,'0');

const option =
document.createElement("option");

option.value = horario;
option.textContent = horario;

selectHora.appendChild(option);

}

}

}

/* CALENDÁRIO */

document.addEventListener('DOMContentLoaded', function(){

carregarHorarios();

const calendarEl =
document.getElementById('calendar');

calendario =
new FullCalendar.Calendar(calendarEl, {

initialView: 'dayGridMonth',

locale: 'pt',

height: 700,

hiddenDays: [0],

headerToolbar: {

left: 'prev,next today',

center: 'title',

right: 'dayGridMonth,timeGridWeek'

},

eventDidMount: function(info){

info.el.style.backgroundColor = "#dc3545";
info.el.style.borderColor = "#dc3545";
info.el.style.color = "#fff";

},

dateClick: function(info){
selecionarDia(info.dateStr);
},

eventClick: function(info){
abrirAgendamento(info.event.id);
}

});

calendario.render();

atualizarCalendario();

});

/* SELEÇÃO DE DIA */

function selecionarDia(data){

diaSelecionado = data;

document
.querySelectorAll(".fc-daygrid-day")
.forEach(d=>{

d.classList.remove("fc-day-selecionado");

});

const celulas =
document.querySelectorAll("[data-date='"+data+"']");

celulas.forEach(c=>{

c.classList.add("fc-day-selecionado");

});

mostrarAgendamentosDoDia(data);

document
.getElementById("data")
.value = data;

}

/* LISTAGEM DO DIA */

function mostrarAgendamentosDoDia(data){

    const lista =
    document.getElementById("listaDia");

    const pagamentos =
    JSON.parse(localStorage.getItem("pagamentos")) || [];

    const agendamentosDia =
    agendamentos.filter(a => a.data === data);

    const ativos = [];
    const concluidos = [];

    agendamentosDia.forEach(item => {

        const pago =
        pagamentos.some(
            p => String(p.agendamentoId) === String(item.id)
        );

        if(pago){
            concluidos.push(item);
        }else{
            ativos.push(item);
        }

    });

    lista.innerHTML = "";

    /* ATIVOS */

    lista.innerHTML += `
        <h6 class="mt-2 mb-2">
            📅 Agendamentos Ativos
        </h6>
    `;

    if(ativos.length === 0){

        lista.innerHTML += `
            <p>Nenhum agendamento ativo.</p>
        `;

    }else{

        ativos
        .sort((a,b)=>a.hora.localeCompare(b.hora))
        .forEach(item=>{

            lista.innerHTML += `
            <div
            class="agendamento-item"
            onclick="abrirAgendamento('${item.id}')">

                <strong>${item.hora}</strong><br>
                ${item.cliente}<br>
                ${item.modelo}

            </div>
            `;

        });

    }

    /* CONCLUÍDOS */

    lista.innerHTML += `
        <hr>
        <h6 class="mt-3 mb-2 text-success">
            ✅ Agendamentos Concluídos
        </h6>
    `;

    if(concluidos.length === 0){

        lista.innerHTML += `
            <p>Nenhum concluído.</p>
        `;

    }else{

        concluidos
        .sort((a,b)=>a.hora.localeCompare(b.hora))
        .forEach(item=>{

            lista.innerHTML += `
            <div
            class="agendamento-item"
            style="
                border-left:5px solid green;
                opacity:0.8;
            "
            onclick="abrirAgendamento('${item.id}')">

                <strong>✅ ${item.hora}</strong><br>
                ${item.cliente}<br>
                ${item.modelo}

            </div>
            `;

        });

    }

}

/* CALENDÁRIO */

function atualizarCalendario(){

calendario.removeAllEvents();

agendamentos.forEach(item=>{

calendario.addEvent({
    id: item.id,
    title: item.cliente || "Sem nome",
    start: item.data + "T" + item.hora,

    extendedProps: {
        cliente: item.cliente,
        telefone: item.telefone,
        modelo: item.modelo,
        servicos: item.servicos,
        valor: item.valor,
        observacoes: item.observacoes
    }
});

});

}

/* ABRIR AGENDAMENTO */

function abrirAgendamento(id){

const item =
agendamentos.find(a => a.id === id);

if(!item) return;

agendamentoEditando = id;

document
.getElementById("cliente")
.value = item.cliente;

document
.getElementById("telefone")
.value = item.telefone;

document
.getElementById("modelo")
.value = item.modelo;

document
.getElementById("data")
.value = item.data;

document
.getElementById("hora")
.value = item.hora;

document
.getElementById("valor")
.value = item.valor;

document
.getElementById("observacoes")
.value = item.observacoes;

document
.querySelectorAll(
'.servico-item input[type="checkbox"]'
)
.forEach(cb=>{

cb.checked =
item.servicos.includes(cb.value);

});

document
.getElementById("btnSalvar")
.style.display = "none";

document
.getElementById("btnAtualizar")
.style.display = "block";

}

</script>

<script>

/* LIMPAR FORMULÁRIO */

function limparFormulario(){

document.getElementById("formAgendamento").reset();

document
.querySelectorAll(
'.servico-item input[type="checkbox"]'
)
.forEach(cb => cb.checked = false);

agendamentoEditando = null;

document
.getElementById("btnSalvar")
.style.display = "block";

document
.getElementById("btnAtualizar")
.style.display = "none";

}

/* CAPTURA SERVIÇOS */

function obterServicos(){

const servicos = [];

document
.querySelectorAll(
'.servico-item input[type="checkbox"]:checked'
)
.forEach(cb => {

servicos.push(cb.value);

});

return servicos;

}

/* VERIFICA DUPLICIDADE */

function horarioOcupado(data,hora,idIgnorar=null){

return agendamentos.some(a =>

a.data === data
&&
a.hora === hora
&&
a.id !== idIgnorar

);

}

/* SALVAR NOVO */

document
.getElementById("formAgendamento")
.addEventListener("submit", function(e){

e.preventDefault();

const cliente =
document.getElementById("cliente").value;

const telefone =
document.getElementById("telefone").value;

const modelo =
document.getElementById("modelo").value;

const data =
document.getElementById("data").value;

const hora =
document.getElementById("hora").value;

const valor =
document.getElementById("valor").value;

const observacoes =
document.getElementById("observacoes").value;

const servicos =
obterServicos();

/* DUPLICIDADE */

if(horarioOcupado(data,hora)){

alert(
"Este horário já possui um agendamento."
);

return;

}

const novo = {

id: Date.now().toString(),

cliente,
telefone,
modelo,
data,
hora,
valor,
observacoes,
servicos

};

agendamentos.push(novo);

localStorage.setItem(
"agendamentos",
JSON.stringify(agendamentos)
);

atualizarCalendario();

mostrarAgendamentosDoDia(data);

alert("Agendamento criado com sucesso.");

limparFormulario();

});

/* ATUALIZAR */

document
.getElementById("btnAtualizar")
.addEventListener("click", function(){

if(!agendamentoEditando){
return;
}

const cliente =
document.getElementById("cliente").value;

const telefone =
document.getElementById("telefone").value;

const modelo =
document.getElementById("modelo").value;

const data =
document.getElementById("data").value;

const hora =
document.getElementById("hora").value;

const valor =
document.getElementById("valor").value;

const observacoes =
document.getElementById("observacoes").value;

const servicos =
obterServicos();

/* DUPLICIDADE */

if(
horarioOcupado(
data,
hora,
agendamentoEditando
)
){

alert(
"Já existe um agendamento nesse horário."
);

return;

}

const indice =
agendamentos.findIndex(
a => a.id === agendamentoEditando
);

if(indice === -1){
return;
}

agendamentos[indice] = {

id: agendamentoEditando,

cliente,
telefone,
modelo,
data,
hora,
valor,
observacoes,
servicos

};

localStorage.setItem(
"agendamentos",
JSON.stringify(agendamentos)
);

atualizarCalendario();

mostrarAgendamentosDoDia(data);

alert("Agendamento atualizado.");

limparFormulario();

});

/* EXCLUIR */

function excluirAgendamento(){

if(!agendamentoEditando){
return;
}

if(
!confirm(
"Deseja apagar este agendamento?"
)
){
return;
}

agendamentos =
agendamentos.filter(
a => a.id !== agendamentoEditando
);

localStorage.setItem(
"agendamentos",
JSON.stringify(agendamentos)
);

atualizarCalendario();

if(diaSelecionado){
mostrarAgendamentosDoDia(diaSelecionado);
}

alert("Agendamento removido.");

limparFormulario();

}
if(localStorage.getItem("perfil") === "funcionario"){

    const despesas =
    document.getElementById("menuDespesas");

    if(despesas){
        despesas.style.display = "none";
    }

    const relatorios =
    document.getElementById("menuRelatorios");

    if(relatorios){
        relatorios.style.display = "none";
    }

}
 let formularioAlterado = false;

document.querySelectorAll(
"input, select, textarea"
).forEach(campo => {

    campo.addEventListener(
        "change",
        () => {
            formularioAlterado = true;
        }
    );

});

window.addEventListener(
    "beforeunload",
    function(e){

        if(formularioAlterado){

            e.preventDefault();
            e.returnValue = "";

        }

    }
);
</script>

</body>
</html>
