<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema Oficina - Versão 2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

<style>

body{
margin:0;
background:#eef2f7;
font-family:Arial;
}

/* LAYOUT APP */
.app{
display:flex;
height:100vh;
}

/* MENU */
.menu{
width:260px;
background:#0d6efd;
color:white;
padding:20px;
}

.menu h2{
font-size:18px;
margin-bottom:20px;
}

.menu button{
width:100%;
margin-bottom:10px;
border:none;
padding:10px;
border-radius:8px;
background:white;
color:#0d6efd;
font-weight:bold;
}

/* CONTEÚDO */
.conteudo{
flex:1;
padding:20px;
overflow:auto;
}

/* CARD */
.card{
border:none;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
padding:15px;
background:white;
}

/* FORM */
input, select{
margin-bottom:10px;
}

/* CALENDÁRIO */
#calendar{
background:white;
padding:10px;
border-radius:12px;
}

.badge{
font-size:12px;
}

</style>
</head>

<body>

<div class="app">

<!-- MENU -->
<div class="menu">

<h2>🚗 Oficina System</h2>

<button>Dashboard</button>
<button>Agenda</button>
<button>Clientes</button>
<button>Relatórios</button>

</div>

<!-- CONTEÚDO -->
<div class="conteudo">

<div class="row">

<!-- CALENDÁRIO -->
<div class="col-md-8">
<div class="card">
<div id="calendar"></div>
</div>
</div>

<!-- FORM -->
<div class="col-md-4">

<div class="card">

<h5>Novo Agendamento</h5>

<input type="text" id="nome" class="form-control" placeholder="Cliente">

<input type="text" id="telefone" class="form-control" placeholder="Telefone">

<input type="text" id="modelo" class="form-control" placeholder="Modelo do carro">

<input type="time" id="hora" class="form-control">

<select id="servico" class="form-control">
<option value="15">Aspiração interior e exterior</option>
<option value="25">Estofos sem teto</option>
<option value="30">Estofos com teto</option>
<option value="20">Faróis</option>
<option value="50">Polimento</option>
<option value="35">Lavagem bancos</option>
</select>

<select id="pagamento" class="form-control">
<option>Dinheiro</option>
<option>MB Way</option>
<option>Cartão</option>
<option>Transferência</option>
</select>

<button class="btn btn-primary w-100 mt-2" onclick="salvar()">
Salvar
</button>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

let calendar;

document.addEventListener('DOMContentLoaded', function() {

calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

initialView: 'dayGridMonth',

headerToolbar: {
left: 'prev,next today',
center: 'title',
right: 'dayGridMonth,timeGridWeek,timeGridDay'
},

dateClick: function(info){
alert("Dia selecionado: " + info.dateStr);
},

eventClick: function(info){

if(confirm("Deseja apagar este agendamento?")){

eventos = eventos.filter(e => e.id !== info.event.id);

localStorage.setItem("eventos", JSON.stringify(eventos));

info.event.remove();

}

},

events: eventos

});

calendar.render();

});

function salvar(){

let dataHoje = new Date().toISOString().split("T")[0];

let novo = {

id: Date.now().toString(),

title: document.getElementById("nome").value + " - " + document.getElementById("modelo").value,

start: dataHoje + "T" + document.getElementById("hora").value,

extendedProps:{
telefone: document.getElementById("telefone").value,
servico: document.getElementById("servico").value,
pagamento: document.getElementById("pagamento").value
}

};

eventos.push(novo);

localStorage.setItem("eventos", JSON.stringify(eventos));

calendar.addEvent(novo);

alert("Agendamento criado com sucesso!");

}

</script>

</body>
</html>
